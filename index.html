            },
            boxShadow: {
              'paper': '0 4px 20px rgba(44, 37, 51, 0.08)',
              'paper-hover': '0 8px 30px rgba(197, 78, 53, 0.15)',
              'paper-inner': 'inset 0 2px 4px rgba(44, 37, 51, 0.05)',
            },
            animation: {
              'fade-in': 'fadeIn 0.6s ease-out',
              'slide-up': 'slideUp 0.6s ease-out',

                '0%': { opacity: '0' },

                '0%': { transform: 'translateY(20px)', opacity: '0' },

          }
